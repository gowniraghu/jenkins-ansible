---
- name: install httpd service
  hosts: all
  become: true

  tasks:
    - name: install httpd package
      yum:
        name: httpd
        state: present

    - name: start httpd service 
      service:
        name: httpd
        state: started
        enabled: true

    - name: copy index.html file to /var/www/html
      copy:
        src: index.html
        dest: /var/www/html/index.html